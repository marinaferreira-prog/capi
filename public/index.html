<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meta CAPI — Formularios Instantáneos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.10);
      padding: 2rem 2.5rem;
      width: 100%;
      max-width: 520px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.8rem;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #1877f2, #0052cc);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      font-size: 1.1rem;
    }

    h1 { font-size: 1.2rem; font-weight: 700; color: #1c1e21; }
    h1 span { display: block; font-size: 0.82rem; font-weight: 400; color: #65676b; margin-top: 2px; }

    .field { margin-bottom: 1rem; }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #1c1e21;
      margin-bottom: 0.35rem;
    }

    label .req { color: #e02020; }
    label .hint { font-weight: 400; color: #65676b; font-size: 0.78rem; margin-left: 0.3rem; }

    input[type="text"],
    input[type="date"],
    select {
      width: 100%;
      padding: 0.55rem 0.75rem;
      border: 1.5px solid #ccd0d5;
      border-radius: 8px;
      font-size: 0.9rem;
      color: #1c1e21;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, select:focus {
      border-color: #1877f2;
      box-shadow: 0 0 0 3px rgba(24,119,242,0.12);
    }

    hr { border: none; border-top: 1px solid #e4e6eb; margin: 1.4rem 0; }

    .section { font-size: 0.72rem; font-weight: 700; color: #65676b; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.9rem; }

    .events-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.5rem;
    }

    .event-option { position: relative; }
    .event-option input[type="radio"] { position: absolute; opacity: 0; pointer-events: none; }
    .event-option label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.75rem;
      border: 1.5px solid #ccd0d5;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.85rem;
      color: #1c1e21;
      transition: all 0.15s;
    }
    .event-option input[type="radio"]:checked + label {
      border-color: #1877f2;
      background: #e7f0fd;
      color: #1877f2;
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      border: 2px solid currentColor;
      flex-shrink: 0;
    }
    .event-option input[type="radio"]:checked + label .dot { background: #1877f2; }

    .btn {
      width: 100%;
      padding: 0.75rem;
      background: #1877f2;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: background 0.15s;
    }
    .btn:hover { background: #166fe5; }
    .btn:disabled { background: #bcc3ce; cursor: not-allowed; }

    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn.loading .spinner { display: block; }
    .btn.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .result {
      margin-top: 1.2rem;
      border-radius: 8px;
      padding: 1rem 1.1rem;
      font-size: 0.87rem;
      display: none;
    }
    .result.success { background: #e7f3e8; border: 1.5px solid #42b72a; color: #1a6e0f; display: block; }
    .result.error   { background: #fdecea; border: 1.5px solid #e02020; color: #9a0000; display: block; }
    .result strong  { display: block; margin-bottom: 0.3rem; }
    .result pre {
      margin-top: 0.5rem;
      background: rgba(0,0,0,0.05);
      padding: 0.5rem;
      border-radius: 4px;
      overflow-x: auto;
      font-size: 0.78rem;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">M</div>
      <h1>Meta CAPI <span>Formularios Instantáneos</span></h1>
    </div>

    <p class="section">Credenciales</p>

    <div class="field">
      <label>Dataset ID <span class="req">*</span></label>
      <input type="text" id="pixelId" placeholder="1010839838494281" />
    </div>

    <div class="field">
      <label>Access Token <span class="req">*</span></label>
      <input type="text" id="accessToken" placeholder="EAABs..." />
    </div>

    <hr />
    <p class="section">Evento</p>

    <div class="field">
      <label>Tipo de evento <span class="req">*</span></label>
      <div class="events-grid">
        <div class="event-option">
          <input type="radio" name="eventName" id="ev-Lead" value="Lead" checked />
          <label for="ev-Lead"><span class="dot"></span> Lead</label>
        </div>
        <div class="event-option">
          <input type="radio" name="eventName" id="ev-CompleteRegistration" value="CompleteRegistration" />
          <label for="ev-CompleteRegistration"><span class="dot"></span> CompleteRegistration</label>
        </div>
        <div class="event-option">
          <input type="radio" name="eventName" id="ev-Contact" value="Contact" />
          <label for="ev-Contact"><span class="dot"></span> Contact</label>
        </div>
        <div class="event-option">
          <input type="radio" name="eventName" id="ev-Subscribe" value="Subscribe" />
          <label for="ev-Subscribe"><span class="dot"></span> Subscribe</label>
        </div>
        <div class="event-option">
          <input type="radio" name="eventName" id="ev-Purchase" value="Purchase" />
          <label for="ev-Purchase"><span class="dot"></span> Purchase</label>
        </div>
        <div class="event-option">
          <input type="radio" name="eventName" id="ev-Schedule" value="Schedule" />
          <label for="ev-Schedule"><span class="dot"></span> Schedule</label>
        </div>
      </div>
    </div>

    <div class="field">
      <label>Fecha del evento <span class="req">*</span></label>
      <input type="date" id="eventDate" />
    </div>

    <div class="field">
      <label>Lead ID <span class="req">*</span> <span class="hint">— ID del lead del formulario instantáneo</span></label>
      <input type="text" id="leadId" placeholder="1234567890123456789" />
    </div>

    <div class="field">
      <label>Lead event source <span class="hint">— nombre de tu CRM o fuente</span></label>
      <input type="text" id="leadEventSource" placeholder="Your CRM" />
    </div>

    <div class="field">
      <label>Evento original <span class="hint">— original_event_data</span></label>
      <select id="originalEventName">
        <option value="">Mismo que el evento seleccionado</option>
        <option value="Lead">Lead</option>
        <option value="CompleteRegistration">CompleteRegistration</option>
        <option value="Contact">Contact</option>
        <option value="Subscribe">Subscribe</option>
        <option value="Purchase">Purchase</option>
        <option value="Schedule">Schedule</option>
      </select>
    </div>

    <div class="field">
      <label>Test Event Code <span class="hint">— Events Manager (opcional)</span></label>
      <input type="text" id="testEventCode" placeholder="TEST12345" />
    </div>

    <button class="btn" id="sendBtn" onclick="sendEvent()">
      <span class="btn-text">Enviar evento</span>
      <div class="spinner"></div>
    </button>

    <div class="result" id="result"></div>
  </div>

  <script>
    document.getElementById('eventDate').value = new Date().toISOString().split('T')[0];

    async function sendEvent() {
      const btn = document.getElementById('sendBtn');
      const resultEl = document.getElementById('result');

      const pixelId = document.getElementById('pixelId').value.trim();
      const accessToken = document.getElementById('accessToken').value.trim();
      const eventDate = document.getElementById('eventDate').value;
      const eventName = document.querySelector('input[name="eventName"]:checked')?.value;

      const leadId = document.getElementById('leadId').value.trim();
      if (!pixelId || !accessToken || !eventDate || !eventName || !leadId) {
        showResult('error', 'Completá todos los campos obligatorios (*).');
        return;
      }

      const body = {
        pixelId,
        accessToken,
        eventName,
        eventDate,
        leadId: document.getElementById('leadId').value.trim(),
        leadEventSource: document.getElementById('leadEventSource').value.trim() || undefined,
        originalEventName: document.getElementById('originalEventName').value || undefined,
        testEventCode: document.getElementById('testEventCode').value.trim() || undefined,
      };

      btn.disabled = true;
      btn.classList.add('loading');
      resultEl.className = 'result';

      try {
        const res = await fetch('/api/send-event', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();

        if (res.ok && data.success) {
          showResult('success', '¡Evento enviado correctamente!', { respuesta: data.result, payload: data.payload });
        } else {
          showResult('error', data.error || 'Error al enviar.', data.details || data);
        }
      } catch (err) {
        showResult('error', 'Error de red: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.classList.remove('loading');
      }
    }

    function showResult(type, msg, details) {
      const el = document.getElementById('result');
      el.className = 'result ' + type;
      const icon = type === 'success' ? '✓' : '✗';
      el.innerHTML = `<strong>${icon} ${msg}</strong>` + (details ? `<pre>${JSON.stringify(details, null, 2)}</pre>` : '');
    }
  </script>
</body>
</html>
