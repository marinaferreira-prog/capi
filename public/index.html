<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meta CAPI — Formularios Instantáneos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.10);
      padding: 2rem 2.5rem;
      width: 100%;
      max-width: 560px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.6rem;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #1877f2, #0052cc);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      font-size: 1.1rem;
    }

    h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #1c1e21;
      line-height: 1.2;
    }

    h1 span {
      display: block;
      font-size: 0.85rem;
      font-weight: 400;
      color: #65676b;
      margin-top: 2px;
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: #65676b;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 1.6rem 0 0.8rem;
    }

    .section-title:first-of-type {
      margin-top: 0.4rem;
    }

    .divider {
      border: none;
      border-top: 1px solid #e4e6eb;
      margin: 1.4rem 0;
    }

    .field {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #1c1e21;
      margin-bottom: 0.35rem;
    }

    label .req { color: #e02020; }

    label .hint {
      font-weight: 400;
      color: #65676b;
      font-size: 0.78rem;
      margin-left: 0.3rem;
    }

    input[type="text"],
    input[type="date"],
    input[type="email"],
    input[type="tel"],
    select,
    textarea {
      width: 100%;
      padding: 0.55rem 0.75rem;
      border: 1.5px solid #ccd0d5;
      border-radius: 8px;
      font-size: 0.9rem;
      color: #1c1e21;
      background: #fff;
      transition: border-color 0.15s;
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #1877f2;
      box-shadow: 0 0 0 3px rgba(24,119,242,0.12);
    }

    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
    }

    .toggle-optional {
      background: none;
      border: none;
      color: #1877f2;
      font-size: 0.82rem;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      margin-bottom: 0.8rem;
    }

    .toggle-optional:hover { text-decoration: underline; }

    .optional-fields {
      display: none;
    }

    .optional-fields.open {
      display: block;
    }

    .btn {
      width: 100%;
      padding: 0.75rem;
      background: #1877f2;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 1.2rem;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn:hover { background: #166fe5; }
    .btn:active { background: #1461cc; }
    .btn:disabled { background: #bcc3ce; cursor: not-allowed; }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    .btn.loading .spinner { display: block; }
    .btn.loading .btn-text { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .result {
      margin-top: 1.2rem;
      border-radius: 8px;
      padding: 1rem 1.1rem;
      font-size: 0.87rem;
      display: none;
    }

    .result.success {
      background: #e7f3e8;
      border: 1.5px solid #42b72a;
      color: #1a6e0f;
      display: block;
    }

    .result.error {
      background: #fdecea;
      border: 1.5px solid #e02020;
      color: #9a0000;
      display: block;
    }

    .result strong { display: block; margin-bottom: 0.3rem; }

    .result pre {
      margin-top: 0.5rem;
      background: rgba(0,0,0,0.05);
      padding: 0.5rem;
      border-radius: 4px;
      overflow-x: auto;
      font-size: 0.78rem;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .events-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.5rem;
    }

    .event-option {
      position: relative;
    }

    .event-option input[type="radio"] {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .event-option label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.75rem;
      border: 1.5px solid #ccd0d5;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.85rem;
      transition: all 0.15s;
      color: #1c1e21;
    }

    .event-option input[type="radio"]:checked + label {
      border-color: #1877f2;
      background: #e7f0fd;
      color: #1877f2;
    }

    .event-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid currentColor;
      flex-shrink: 0;
    }

    .event-option input[type="radio"]:checked + label .event-dot {
      background: #1877f2;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">M</div>
      <h1>Meta CAPI <span>Conversiones desde Formularios Instantáneos</span></h1>
    </div>

    <p class="section-title">Credenciales</p>

    <div class="field">
      <label>Pixel ID <span class="req">*</span></label>
      <input type="text" id="pixelId" placeholder="123456789012345" />
    </div>

    <div class="field">
      <label>Access Token <span class="req">*</span>
        <span class="hint">— token del sistema o del anunciante</span>
      </label>
      <input type="text" id="accessToken" placeholder="EAABs..." />
    </div>

    <hr class="divider" />
    <p class="section-title">Evento</p>

    <div class="field">
      <label>Tipo de evento <span class="req">*</span></label>
      <div class="events-grid">
        <div class="event-option">
          <input type="radio" name="eventName" id="ev-Lead" value="Lead" checked />
          <label for="ev-Lead"><span class="event-dot"></span> Lead</label>
        </div>
        <div class="event-option">
          <input type="radio" name="eventName" id="ev-CompleteRegistration" value="CompleteRegistration" />
          <label for="ev-CompleteRegistration"><span class="event-dot"></span> CompleteRegistration</label>
        </div>
        <div class="event-option">
          <input type="radio" name="eventName" id="ev-Contact" value="Contact" />
          <label for="ev-Contact"><span class="event-dot"></span> Contact</label>
        </div>
        <div class="event-option">
          <input type="radio" name="eventName" id="ev-Subscribe" value="Subscribe" />
          <label for="ev-Subscribe"><span class="event-dot"></span> Subscribe</label>
        </div>
        <div class="event-option">
          <input type="radio" name="eventName" id="ev-Purchase" value="Purchase" />
          <label for="ev-Purchase"><span class="event-dot"></span> Purchase</label>
        </div>
        <div class="event-option">
          <input type="radio" name="eventName" id="ev-Schedule" value="Schedule" />
          <label for="ev-Schedule"><span class="event-dot"></span> Schedule</label>
        </div>
      </div>
    </div>

    <div class="field">
      <label>ID del formulario instantáneo <span class="req">*</span>
        <span class="hint">— lead_id del form de Meta</span>
      </label>
      <input type="text" id="formId" placeholder="1234567890123456789" />
    </div>

    <div class="field">
      <label>Fecha del evento <span class="req">*</span></label>
      <input type="date" id="eventDate" />
    </div>

    <hr class="divider" />
    <p class="section-title">Atribución y fuente</p>

    <div class="row-2">
      <div class="field">
        <label>Lead event source
          <span class="hint">— nombre de tu CRM</span>
        </label>
        <input type="text" id="leadEventSource" placeholder="Your CRM" />
      </div>
      <div class="field">
        <label>Attribution share
          <span class="hint">— 0.0 a 1.0</span>
        </label>
        <input type="text" id="attributionShare" placeholder="0.3" />
      </div>
    </div>

    <div class="field">
      <label>Evento original
        <span class="hint">— original_event_data (opcional, si difiere del evento)</span>
      </label>
      <select id="originalEventName">
        <option value="">Mismo que el evento seleccionado</option>
        <option value="Lead">Lead</option>
        <option value="CompleteRegistration">CompleteRegistration</option>
        <option value="Contact">Contact</option>
        <option value="Subscribe">Subscribe</option>
        <option value="Purchase">Purchase</option>
        <option value="Schedule">Schedule</option>
      </select>
    </div>

    <hr class="divider" />

    <button class="toggle-optional" onclick="toggleOptional()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      <span id="toggleLabel">Agregar datos del usuario (opcional)</span>
    </button>

    <div class="optional-fields" id="optionalFields">
      <p class="section-title" style="margin-top:0">Datos del usuario (se hashean automáticamente)</p>

      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="usuario@email.com" />
      </div>

      <div class="field">
        <label>Teléfono</label>
        <input type="tel" id="phone" placeholder="+54 9 11 1234-5678" />
      </div>

      <div class="row-2">
        <div class="field">
          <label>Nombre</label>
          <input type="text" id="firstName" placeholder="Juan" />
        </div>
        <div class="field">
          <label>Apellido</label>
          <input type="text" id="lastName" placeholder="Pérez" />
        </div>
      </div>

      <div class="field">
        <label>FBC <span class="hint">— click ID de Facebook (fbc)</span></label>
        <input type="text" id="fbc" placeholder="fb.1.1234567890.AbCdEfGhIjKl" />
      </div>

      <div class="field">
        <label>Test Event Code
          <span class="hint">— para pruebas en Events Manager</span>
        </label>
        <input type="text" id="testEventCode" placeholder="TEST12345" />
      </div>
    </div>

    <button class="btn" id="sendBtn" onclick="sendEvent()">
      <span class="btn-text">Enviar evento a Meta CAPI</span>
      <div class="spinner"></div>
    </button>

    <div class="result" id="result"></div>
  </div>

  <script>
    // Poner la fecha de hoy por defecto
    document.getElementById('eventDate').value = new Date().toISOString().split('T')[0];

    function toggleOptional() {
      const el = document.getElementById('optionalFields');
      const label = document.getElementById('toggleLabel');
      const open = el.classList.toggle('open');
      label.textContent = open
        ? 'Ocultar datos del usuario'
        : 'Agregar datos del usuario (opcional)';
    }

    async function sendEvent() {
      const btn = document.getElementById('sendBtn');
      const resultEl = document.getElementById('result');

      const pixelId = document.getElementById('pixelId').value.trim();
      const accessToken = document.getElementById('accessToken').value.trim();
      const formId = document.getElementById('formId').value.trim();
      const eventDate = document.getElementById('eventDate').value;
      const eventName = document.querySelector('input[name="eventName"]:checked')?.value;

      if (!pixelId || !accessToken || !formId || !eventDate || !eventName) {
        showResult('error', 'Completá todos los campos obligatorios (*).');
        return;
      }

      const body = {
        pixelId,
        accessToken,
        eventName,
        formId,
        eventDate,
        leadEventSource: document.getElementById('leadEventSource').value.trim() || undefined,
        attributionShare: document.getElementById('attributionShare').value.trim() || undefined,
        originalEventName: document.getElementById('originalEventName').value || undefined,
        email: document.getElementById('email').value.trim() || undefined,
        phone: document.getElementById('phone').value.trim() || undefined,
        firstName: document.getElementById('firstName').value.trim() || undefined,
        lastName: document.getElementById('lastName').value.trim() || undefined,
        fbc: document.getElementById('fbc').value.trim() || undefined,
        testEventCode: document.getElementById('testEventCode').value.trim() || undefined,
      };

      btn.disabled = true;
      btn.classList.add('loading');
      resultEl.style.display = 'none';
      resultEl.className = 'result';

      try {
        const response = await fetch('/api/send-event', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        const data = await response.json();

        if (response.ok && data.success) {
          showResult('success',
            '¡Evento enviado correctamente!',
            { respuesta: data.result, payload_enviado: data.payload }
          );
        } else {
          showResult('error',
            data.error || 'Error al enviar el evento.',
            data.details || data
          );
        }
      } catch (err) {
        showResult('error', 'Error de red: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.classList.remove('loading');
      }
    }

    function showResult(type, message, details) {
      const el = document.getElementById('result');
      el.className = 'result ' + type;
      const icon = type === 'success' ? '✓' : '✗';
      let html = `<strong>${icon} ${message}</strong>`;
      if (details) {
        html += `<pre>${JSON.stringify(details, null, 2)}</pre>`;
      }
      el.innerHTML = html;
    }
  </script>
</body>
</html>
